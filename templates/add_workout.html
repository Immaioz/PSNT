{% extends "base.html" %}

{% block title %}Nuovo Allenamento - Workout Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h1 class="mb-4"><i class="bi bi-plus-circle"></i> Nuovo Allenamento</h1>
        
        <div class="card shadow">
            <div class="card-body p-4">
                <form method="POST" novalidate>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="date" class="form-label">Data</label>
                            <input type="date" class="form-control form-control-lg" id="date" name="date" value="{{ default_date }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="day" class="form-label">Routine</label>
                            <select class="form-select form-select-lg" id="day" name="day">
                                <option value="">-- Seleziona una routine --</option>
                                {% for r in routines %}
                                    <option value="{{ r.name }}">{{ r.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="exercise" class="form-label">Esercizio *</label>
                        <input type="text" class="form-control form-control-lg" id="exercise" name="exercise" placeholder="Cerca o scrivi un esercizio..." autocomplete="off" required>
                        <input type="hidden" id="exercise_id" name="exercise_id" value="">
                    </div>

                    {% include 'exercise_autocomplete.html' %}

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="sets" class="form-label">Set</label>
                            <input type="number" class="form-control form-control-lg" id="sets" name="sets" placeholder="es. 3">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="reps" class="form-label">Reps</label>
                            <input type="text" class="form-control form-control-lg" id="reps" name="reps" placeholder="es. 8-10">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="weight" class="form-label">Peso (kg)</label>
                            <input type="text" class="form-control form-control-lg" id="weight" name="weight" placeholder="es. 100">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="notes" class="form-label">Note</label>
                        <textarea class="form-control form-control-lg" id="notes" name="notes" rows="3" placeholder="Aggiungi note..."></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-circle"></i> Aggiungi
                        </button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-lg">
                            <i class="bi bi-x-circle"></i> Annulla
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
